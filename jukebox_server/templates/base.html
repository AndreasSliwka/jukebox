{% extends "core.html" %} {% block body_content %}
<header>
    <div id="header_line">
        <span id="title"> {% block title %} Jukebox {% endblock %} </span>
    </div>
</header>
<main
    id="root_of_all_evil"
    class="{% block mainClass %}{% endblock %} zoom-{{zoom}}"
>
    {% block content %}{% endblock content %}
    <div class="footer_placeholder" />
</main>
<footer
    class="{% if is_admin %}isAdmin{% endif %} {%if show_private %}showPrivate{% endif %}"
    x-data="{showChords: currentShowChords()}"
>
    {% if show_search %}
    <a id="toggle_search" class="toolbar-button">🔍</a>
    {% else %}
    <a id="back_to_song_list" href="/songs" class="toolbar-button">↩</a>
    {% endif %} {% if is_admin %}
    <a id="toggle_private_songs" class="toolbar-button">😎</a>
    {% else %}
    <a id="toggle_played_songs" class="toolbar-button">👻</a>
    {% endif %}
    <a id="show_qr" href="javascript:showQrOverlay()" class="toolbar-button"
        >QR</a
    >
    <a id="toggle_zoom_selector" class="toolbar-button">ᴬA</a>
    <a id="toggle_chords" class="toolbar-button">C⁷</a>
    <a id="toggle_tags" class="toolbar-button">🎲</a>
    <div
        id="search_form"
        class="bg-amber-400"
        x-data="{ visible: false, search: getCookieValue('search') }"
        x-show="visible"
        x-init="filterTableByText(getCookieValue('search'))"
    >
        <input
            id="song_search"
            type="text"
            name="search"
            enterkeyhint="search"
            placeholder="Find my love ..."
            x-model="search"
            @change="setSearchFilter($event.target.value)"
            ;
            class="flex-auto p-0.5 border-amber-900 border-2"
        />
    </div>
</footer>
<div
    id="overlay"
    x-data="{visible: false}"
    x-on:click="visible = false"
    x-on:hide="visible = false"
    x-on:show="visible = true"
    x-show="visible"
>
    <div id="shadow"></div>
    <div id="modal" x-on:click.stop.prevent="true;">
        <div id="qr_code" class="hidden modal-content">
            {{ qr_code_svg | safe }}
        </div>
    </div>
</div>
{% endblock %}
