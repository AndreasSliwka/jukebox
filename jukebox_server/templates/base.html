{% extends "core.html" %} {% block body_content %}
<header
    x-data="{ menu: false }"
    class="z-10 h-10 text-[1.7em] align-middle bg-amber-200 fixed top-0 right-0 left-0"
>
    <div class="h-10 text-center relative bg-amber-200 left-0">
        <span class="absolute left-0">
            {% block upper_right_button %} 🔥 {% endblock %}
        </span>
        {% block title %} Jukebox {% endblock %}
        <span id="menu_trigger" class="absolute right-0" @click="menu = ! menu">
            {% if is_admin %} &nbsp;🍔&nbsp; {% else %} &nbsp;≡&nbsp; {% endif
            %}
        </span>
    </div>
    <div
        x-show="menu"
        x-transition.duration.500ms
        class="bg-amber-200 pl-2 pr-2 border-l-2 border-b-2 float-right"
    >
        <div class="menuitem">
            <label
                x-data="{ show_chords: getCookieValue('showChords') == 'true'}"
                ><input
                    type="checkbox"
                    name="chords"
                    x-model="show_chords"
                    class="hidden"
                    x-on:change="setCookieValue('showChords', $event.target.checked.toString());maybeApplyShowChords()"
                />Akkorde anzeigen
                <span x-show="show_chords">✅</span>
                <span x-show="!show_chords">🚫</span>
            </label>
        </div>
        <div class="menuitem">
            <label
                x-data="{ hide_played_songs: getCookieValue('hidePlayedSongs') == 'true'}"
                ><input
                    type="checkbox"
                    name="chords"
                    x-model="hide_played_songs"
                    class="hidden"
                    x-on:change="setCookieValue('hidePlayedSongs', $event.target.checked.toString());maybeApplyHidePlayedSongs()"
                />Gespielte Lieder verstecken
                <span x-show="hide_played_songs">✅</span>
                <span x-show="!hide_played_songs">🚫</span>
            </label>
        </div>
        <div class="menuitem">
            <button>
                <!-- TODO: Zoom button does nothing -->
                <span class="btn btn-blue">&nbsp;-&nbsp;</span>&nbsp; Z o
            </button>
            <button>
                o m &nbsp;<span class="btn btn-blue">&nbsp;+&nbsp;</span>
            </button>
        </div>
    </div>
</header>
<div id="placeholder_under_header" class="h-11"></div>
<main class="">{% block content %}{% endblock content %}</main>
{% endblock %}
