{% extends "core.html" %} {% block body_content %}
<header x-data="{ menu: false }">
    <div id="header_line">
        <span id="title"> {% block title %} Jukebox {% endblock %} </span>
    </div>
</header>
<main
    id="root_of_all_evil"
    class="{% block mainClass %}{% endblock %} zoom-{{zoom}}"
>
    {% block content %}{% endblock content %}
    <div class="footer_placeholder" />
</main>
<footer
    class="{% if is_admin %}isAdmin{% endif %} {%if show_private %}showPrivate{% endif %}"
>
    {% if show_search %}
    <a id="toggle_search">🔍</a>
    {% else %}
    <a id="back_to_song_list" href="/songs">↩</a>
    {% endif %} {% if is_admin %}
    <a id="toggle_private_songs">😎</a>
    {% else %}
    <a id="toggle_played_songs">👻</a>
    {% endif %}
    <a id="show_qr" href="/qrcode">QR</a>
    <a id="toggle_zoom_selector">ᴬA</a>
    <a id="toggle_chords">C⁷</a>
    <a id="toggle_tags">🎲</a>
    <div
        id="search_form"
        class="bg-amber-400"
        x-data="{ search: getCookieValue('search') }"
        x-init="filterTableByText(getCookieValue('search'))"
    >
        <input
            id="song_search"
            type="text"
            name="search"
            enterkeyhint="search"
            placeholder="Find my love ..."
            x-model="search"
            @change="setSearchFilter($event.target.value)"
            ;
            class="flex-auto p-0.5 border-amber-900 border-2"
        />
    </div>
</footer>
{% endblock %}
