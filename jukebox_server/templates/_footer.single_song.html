<footer id="footer" class="" x-data="{showChords: Cookies.storedShowChords()}">
    <a id="back_to_song_list" class="toolbar-button at-1-1" href="/songs">↩</a>
    <a
        id="toggle_zoom"
        class="toolbar-button at-2-1"
        href="javascript:Toolbar.toggleZoomForm()"
        >ᴬA</a
    >
    <a
        id="show_qr"
        href="javascript:Toolbar.showQrOverlay()"
        class="toolbar-button at-3-1"
        >QR</a
    >
    <a
        id="bookmark_song"
        href="javascript:Toolbar.toggleBookmarkSong({{song_id}})"
        class="toolbar-button at-4-1"
        :class="{active: Bookmark.isMarked({{song_id}})}"
        >💾</a
    >
    <a
        id="toggle_chords"
        href="javascript:Toolbar.toggleShowChords()"
        class="toolbar-button at-4-1"
        :class="{active: Chords.showInline()}"
        >C7</a
    >
    <div id="zoom_form" class="hidden bg-amber-400" x-init="">
        <label class="at-1-2">Zoom:</label>
        <div id="zoom-backdrop"><img src="/static/zoom_backdrop.png" /></div>
        <div class="zoom-levels at-2-2">
            {% for level in 1..8 %}

            <a
                href="javascript:Toolbar.changeZoomTo({{level}})"
                class="zoom-level-choice zoom-{{level}}"
                >&nbsp;</a
            >
            {% endfor %}
        </div>
    </div>
</footer>
