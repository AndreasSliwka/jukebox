<footer id="footer" class="" x-data="{showChords: Cookies.storedShowChords()}">
    <a id="back_to_song_list" class="toolbar-button at-1-1" href="/songs">↩</a>
    <a
        id="toggle_zoom"
        class="toolbar-button at-2-1"
        href="javascript:SingleSongToolbar.toggleZoomForm()"
        >ᴬA</a
    >
    <a
        id="show_qr"
        href="javascript:SingleSongToolbar.showQrOverlay()"
        class="toolbar-button at-3-1"
        >QR</a
    >
    <a
        id="bookmark_song"
        href="javascript:SingleSongToolbar.toggleBookmarkSong({{song_id}})"
        class="toolbar-button at-4-1"
        :class="{active: Bookmark.isMarked({{song_id}})}"
        >💾</a
    >
    <a
        id="toggle_chords"
        href="javascript:SingleSongToolbar.toggleShowChords()"
        class="toolbar-button at-5-1"
        :class="{active: Chords.showInline()}"
        >C7</a
    >
    {% if is_admin %}
    <a
        id="being_admin"
        href="javascript:SingleSongToolbar.showAdminPanel()"
        class="toolbar-button at-6-1"
        >🧑‍🍳</a
    >
    {% endif %} {% include "zoom/form.html" %}
</footer>
